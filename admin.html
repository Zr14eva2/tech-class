<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech with Zach - Admin</title>
  <link rel="icon" href="favicon.png">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      margin: 0;
      padding: 0;
      color: #e5e7eb;
      min-height: 100vh;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(2, 6, 23, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
      font-size: 18px;
      color: #e5e7eb;
    }

    .nav-logo a {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
    }

    .nav-logo span {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #f4682b, #d61818);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    nav a {
      color: #cbd5f5;
      text-decoration: none;
      margin-left: 16px;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #38bdf8;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .password-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 80px);
      flex-direction: column;
    }

    .password-form {
      background: rgba(15, 23, 42, 0.9);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      max-width: 400px;
      width: 100%;
    }

    .password-form h2 {
      color: #38bdf8;
      margin-top: 0;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #38bdf8;
      font-weight: 500;
    }

    .password-input-wrapper {
      position: relative;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid rgba(56, 189, 248, 0.3);
      border-radius: 8px;
      background: rgba(2, 6, 23, 0.8);
      color: #e5e7eb;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.3s ease;
      box-sizing: border-box;
    }

    .password-input-wrapper input {
      padding-right: 45px;
    }

    .form-group input:focus {
      outline: none;
      border-color: #38bdf8;
    }

    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 18px;
      padding: 5px;
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: #38bdf8;
    }

    .submit-btn {
      background: linear-gradient(135deg, #f4682b, #d61818);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(244, 104, 43, 0.3);
      width: 100%;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(244, 104, 43, 0.5);
    }

    .error-message {
      color: #f87171;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .admin-interface {
      display: none;
    }

    .admin-interface.active {
      display: block;
    }

    header {
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
      color: #e5e7eb;
    }

    h2 {
      color: #38bdf8;
      margin-top: 0;
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stats {
      background: rgba(15, 23, 42, 0.9);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      margin-bottom: 30px;
      text-align: center;
    }

    .stats h2 {
      margin-bottom: 15px;
    }

    .stats-number {
      font-size: 48px;
      font-weight: bold;
      color: #38bdf8;
      margin: 10px 0;
    }

    .stats-actions {
      margin-top: 20px;
    }

    .not-an-admin {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 20px;
      margin-bottom: 20px;
      text-align: center;
    }
    .register-button {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      height: 100px;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
    }
    button:active {
      transform: translateY(0);
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    }
    #registered {
      color: #38bdf8;
      font-weight: bold;
      font-size: 18px;
    }
    #registered:hover {
      color: #10b981;
    }
    #registered:active {
      color: #059669;
    }
    .registered-container {
      height: 125px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      margin-top: 20px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.9);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border-left: 4px solid #38bdf8;
      width: 600px;
    }
    .unregister-button {
      background: linear-gradient(135deg, #c14848, #cc1616);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      height: 100px;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <a href="index.html">
      <span>Z</span>
      Zach Tech
    </a>
  </div>
  <div>
    <a href="index.html">Back to Site</a>
  </div>
</nav>

<div class="password-screen" id="passwordScreen">
  <div class="password-form">
    <h2>Admin Access</h2>
    <p class="not-an-admin">Please note that if you are reading this, you are not an admin and I would ask you to please return to the main page.</p>
    <form onsubmit="checkPassword(event)">
      <div class="form-group">
        <label for="password">Enter Password</label>
        <div class="password-input-wrapper">
          <input type="password" id="password" name="password" required autofocus>
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility()" id="passwordToggle">👁️</button>
        </div>
      </div>
      <button type="submit" class="submit-btn">Login</button>
      <div class="error-message" id="errorMessage">Incorrect password. Please try again.</div>
    </form>
  </div>
</div>

<div class="container admin-interface" id="adminInterface">
  <header>
    <h1>Admin Dashboard</h1>
    <p>Shedule and register form submissions</p>
  </header>
  <div class="registered-container">
  <button class="register-button" onclick="addRegistered()">Click every time someone registers for a class</button>
  <button class="unregister-button" onclick="removeRegistered()">Click every time someone unregisters for a class</button>
  <p>Registered: <span id="registered">0</span></p>
  </div>

<script>
let registered = localStorage.getItem("registeredCount");
registered = registered ? parseInt(registered) : 0;

const registeredEl = document.getElementById("registered");
registeredEl.textContent = registered;

function addRegistered() {
  registered++;
  updateDisplay();
}

function removeRegistered() {
  if (registered > 0) {
    registered--;
    updateDisplay();
  }
}

function updateDisplay() {
  registeredEl.textContent = registered;
  localStorage.setItem("registeredCount", registered);
}

  const ADMIN_PASSWORD = 'Astronaut2014';

  function checkPassword(event) {
    event.preventDefault();
    const passwordInput = document.getElementById('password');
    const errorMessage = document.getElementById('errorMessage');
    const password = passwordInput.value;

    if (password === ADMIN_PASSWORD) {
      // Hide password screen, show admin interface
      document.getElementById('passwordScreen').style.display = 'none';
      document.getElementById('adminInterface').classList.add('active');
      loadSubmissions();
    } else {
      // Show error and clear input
      errorMessage.classList.add('show');
      passwordInput.value = '';
      passwordInput.focus();
    }
  }
  
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function togglePasswordVisibility() {
    const passwordInput = document.getElementById('password');
    const toggleButton = document.getElementById('passwordToggle');
    
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      toggleButton.textContent = '🙈';
    } else {
      passwordInput.type = 'password';
      toggleButton.textContent = '👁️';
    }
  }

  function clearSubmissions() {
    if (confirm('Are you sure you want to clear all submissions? This action cannot be undone.')) {
      localStorage.removeItem('contactSubmissions');
      loadSubmissions();
    }
  }
</script>

</body>
</html>
